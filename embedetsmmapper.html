<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITRE EMB3D + ESTM — Threat Surface Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f; --bg2: #141414; --bg3: #191919; --bg-hl: #2a2416;
  --border: #292929; --border-l: #3a3a3a;
  --text: #e7e5e4; --text2: #a8a29e; --text3: #78716c; --text4: #57534e;
  --accent: #d97757; --accent2: #c6a664; --green: #6b9a8b;
  --blue: #7a8db5; --purple: #8b7ab5; --brown: #b87a6b; --red: #b84d3c;
  --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  --serif: 'Fraunces', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a2a; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
a { color: var(--text3); text-decoration: none; }
a:hover { color: var(--accent); }
button { font-family: var(--mono); cursor: pointer; background: none; border: none; color: inherit; }
input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }

.container { max-width: 1440px; margin: 0 auto; padding: 0 20px; }

/* Header */
header { border-bottom: 1px solid var(–border); }
.header-inner { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; padding: 20px 0; }
.header-left .tag { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.pulse { width: 6px; height: 6px; background: var(–accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.tag span { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(–text3); }
h1 { font-family: var(–serif); font-size: clamp(28px, 5vw, 40px); font-weight: 700; color: var(–text); line-height: 1; }
h1 em { font-style: italic; color: var(–accent); }
.stats { display: flex; align-items: center; gap: 12px; }
.stat { text-align: right; }
.stat-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(–text3); }
.stat-val { font-family: var(–serif); font-size: 24px; font-weight: 700; }
.stat-val.small { font-size: 13px; font-weight: 700; letter-spacing: 0.15em; }
.stat-div { width: 1px; height: 40px; background: var(–border); }

/* Main grid */
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 0; }
@media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

/* Panels */
.panel { border: 1px solid var(–border); background: var(–bg2); display: flex; flex-direction: column; }
.panel-head { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(–border); padding: 10px 12px; }
.panel-head .label { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(–text3); }
.btn-group { display: flex; gap: 4px; }
.btn-sm { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border: 1px solid var(–border); color: var(–text3); transition: all 0.15s; }
.btn-sm:hover { border-color: var(–border-l); color: var(–text); }
.btn-sm.danger { color: var(–accent); border-color: #3a2419; }
.btn-sm.danger:hover { border-color: var(–accent); }

/* Properties */
.prop-scroll { max-height: 72vh; overflow-y: auto; }
.cat-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(–bg3); position: sticky; top: 0; z-index: 5; border-bottom: 1px solid var(–border); }
.cat-header h3 { font-family: var(–serif); font-size: 14px; font-weight: 600; }
.cat-header .line { flex: 1; border-top: 1px dashed var(–border); }
.cat-header svg { width: 14px; height: 14px; color: var(–accent); }
.prop-node { display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px 6px; transition: background 0.1s; cursor: default; }
.prop-node:hover { background: #181818; }
.prop-node.selected { background: var(–bg-hl); }
.prop-chevron { flex-shrink: 0; width: 14px; height: 14px; margin-top: 3px; color: var(–text3); cursor: pointer; transition: color 0.15s; }
.prop-chevron:hover { color: var(–text); }
.prop-chevron.hidden { opacity: 0; pointer-events: none; }
.prop-label { display: flex; align-items: flex-start; gap: 8px; flex: 1; min-width: 0; cursor: pointer; }
.prop-label input { margin-top: 4px; flex-shrink: 0; }
.prop-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.prop-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pid { font-size: 10px; letter-spacing: 0.15em; color: var(–text3); }
.selected .pid { color: var(–accent); }
.threat-count { font-size: 9px; padding: 1px 5px; background: #1f1a12; color: var(–accent2); border: 1px solid #3a2e1c; }
.prop-desc { font-size: 12px; line-height: 1.4; color: #d6d3d1; }
.selected .prop-desc { color: var(–text); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(–border); }
.tab { display: flex; align-items: center; gap: 6px; padding: 10px 16px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 2px solid transparent; color: var(–text3); transition: all 0.15s; }
.tab:hover { color: #d6d3d1; }
.tab.active { border-color: var(–accent); color: var(–text); }
.tab .count { font-weight: 700; }
.tab-spacer { flex: 1; }

/* Search */
.search-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(–border); }
.search-bar input { flex: 1; background: transparent; border: none; outline: none; font-family: var(–mono); font-size: 11px; color: var(–text); }
.search-bar input::placeholder { color: var(–text4); }
.search-bar svg { width: 12px; height: 12px; color: var(–text3); }
.clear-btn { background: none; border: none; color: var(–text3); cursor: pointer; }
.clear-btn:hover { color: var(–text); }

/* Threats list */
.right-scroll { flex: 1; overflow-y: auto; max-height: 68vh; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 32px; color: var(–text3); text-align: center; }
.empty-state svg { width: 28px; height: 28px; color: var(–text4); margin-bottom: 12px; }
.empty-state h4 { font-family: var(–serif); font-size: 18px; color: var(–text2); margin-bottom: 4px; }
.empty-state p { font-size: 11px; max-width: 260px; line-height: 1.5; }

.threat-cat-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(–bg3); border-bottom: 1px solid var(–border); }
.threat-cat-header .dot { width: 6px; height: 6px; flex-shrink: 0; }
.threat-cat-header .name { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; }
.threat-cat-header .line { flex: 1; border-top: 1px dashed var(–border); }
.threat-cat-header .num { font-size: 9px; color: var(–text3); }

.threat-row { border-bottom: 1px solid #1c1c1c; transition: background 0.1s; }
.threat-row:last-child { border-bottom: none; }
.threat-row:hover { background: #181818; }
.threat-row.expanded { background: #1a1612; }
.threat-btn { display: flex; align-items: flex-start; gap: 10px; width: 100%; text-align: left; padding: 10px 12px; }
.threat-tid { font-size: 10px; letter-spacing: 0.1em; flex-shrink: 0; padding-top: 2px; }
.threat-name { flex: 1; font-size: 12px; color: #d6d3d1; line-height: 1.4; }
.threat-chevron { width: 12px; height: 12px; flex-shrink: 0; margin-top: 2px; color: var(–text3); transition: transform 0.2s; }
.threat-row.expanded .threat-chevron { transform: rotate(180deg); }

.threat-detail { padding: 4px 12px 12px 54px; }
.detail-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(–text3); margin-bottom: 4px; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.detail-tag { font-size: 9px; padding: 2px 6px; border: 1px solid; }
.pid-tag { background: var(–bg-hl); color: var(–accent); border-color: #3a2419; }
.tactic-tag { font-size: 9px; padding: 2px 6px; }
.detail-link { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(–text3); letter-spacing: 0.1em; }
.detail-link:hover { color: var(–accent); }
.detail-link svg { width: 9px; height: 9px; }

/* Tactics view */
.tactics-list { padding: 12px; display: flex; flex-direction: column; gap: 4px; }
.tactic-card { width: 100%; text-align: left; padding: 10px 12px; border: 1px solid var(–border); background: var(–bg2); transition: all 0.15s; }
.tactic-card:hover:not(.disabled) { border-color: var(–border-l); }
.tactic-card.disabled { opacity: 0.35; cursor: default; }
.tactic-card.active { border-color: #444; background: #1a1612; }
.tactic-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.tactic-id { font-size: 9px; letter-spacing: 0.15em; color: var(–text3); }
.tactic-name { font-size: 12px; font-weight: 500; }
.tactic-count { margin-left: auto; font-size: 11px; font-weight: 700; }
.tactic-bar { height: 3px; background: #1c1c1c; overflow: hidden; margin-bottom: 4px; }
.tactic-bar-fill { height: 100%; transition: width 0.5s; }
.tactic-desc { font-size: 10px; color: var(–text3); line-height: 1.4; }
.tactic-detail { border: 1px solid #444; border-top: none; background: #191612; padding: 10px 12px; }
.tactic-threat-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 2px 0; }
.tactic-threat-row .tid { font-size: 10px; }

/* Footer */
footer { margin-top: 16px; padding: 12px 0; border-top: 1px solid var(–border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(–text4); }
footer .links { display: flex; gap: 12px; }
footer a { display: inline-flex; align-items: center; gap: 4px; }

/* SVG icons inline */
.icon { display: inline-block; vertical-align: middle; }
</style>

</head>

const CHEVRON_RIGHT = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
const CHEVRON_DOWN = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';

// ===================================================================
// STATE
// ===================================================================
const selectedProps = new Set();
const expandedProps = new Set();
let activeView = "threats";
let activeThreat = null;
let selectedTactic = null;

// flatten properties
const flatProps = {};
function flattenProps(nodes) { for (const n of nodes) { flatProps[n.id] = n; if (n.children) flattenProps(n.children); } }
PROP_TREE.forEach(c => flattenProps(c.props));

function threatCatInfo(tid) {
  const n = parseInt(tid.split("-")[1]);
  if (n < 200) return {name:"Hardware",color:"#d97757"};
  if (n < 300) return {name:"System Software",color:"#c6a664"};
  if (n < 400) return {name:"Application Software",color:"#6b9a8b"};
  return {name:"Networking",color:"#7a8db5"};
}

// ===================================================================
// COMPUTE
// ===================================================================
function computeThreats() {
  const map = new Map();
  for (const pid of selectedProps) {
    const node = flatProps[pid]; if (!node) continue;
    for (const tid of node.threats) { if (!map.has(tid)) map.set(tid, new Set()); map.get(tid).add(pid); }
  }
  return map;
}

function computeTacticHeat(threatMap) {
  const heat = {};
  for (const t of Object.keys(ESTM_TACTICS)) heat[t] = {count:0, threats:new Set()};
  for (const tid of threatMap.keys()) {
    const tt = THREATS[tid]; if (!tt) continue;
    for (const tac of tt.tactics) { if (heat[tac]) { heat[tac].count++; heat[tac].threats.add(tid); } }
  }
  return heat;
}

// ===================================================================
// RENDER PROPERTIES
// ===================================================================
function renderProps() {
  const container = document.getElementById("prop-container");
  let html = "";
  for (const cat of PROP_TREE) {
    html += `<div style="border-bottom:1px solid var(--border)">`;
    html += `<div class="cat-header">${CAT_ICONS[cat.cat]}<h3>${cat.cat}</h3><div class="line"></div></div>`;
    html += `<div style="padding:2px 0">`;
    html += renderPropNodes(cat.props, 0);
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function renderPropNodes(nodes, depth) {
  let html = "";
  for (const n of nodes) {
    const has = n.children && n.children.length > 0;
    const isExp = expandedProps.has(n.id);
    const isSel = selectedProps.has(n.id);
    html += `<div class="prop-node ${isSel ? "selected" : ""}" style="padding-left:${depth*18+8}px">`;
    html += `<span class="prop-chevron ${has ? "" : "hidden"}" onclick="toggleExpand('${n.id}')">${has ? (isExp ? CHEVRON_DOWN : CHEVRON_RIGHT) : CHEVRON_RIGHT}</span>`;
    html += `<label class="prop-label"><input type="checkbox" ${isSel ? "checked" : ""} onchange="toggleProp('${n.id}')">`;
    html += `<span class="prop-info"><span class="prop-meta"><span class="pid">${n.id}</span>`;
    if (n.threats.length > 0) html += `<span class="threat-count">${n.threats.length}T</span>`;
    html += `</span><span class="prop-desc">${n.label}</span></span></label></div>`;
    if (has && isExp) html += renderPropNodes(n.children, depth + 1);
  }
  return html;
}

function toggleProp(id) { selectedProps.has(id) ? selectedProps.delete(id) : selectedProps.add(id); activeThreat = null; selectedTactic = null; refresh(); }
function toggleExpand(id) { expandedProps.has(id) ? expandedProps.delete(id) : expandedProps.add(id); renderProps(); }
function expandAll() { const walk = ns => { for (const n of ns) { if (n.children) { expandedProps.add(n.id); walk(n.children); } } }; PROP_TREE.forEach(c => walk(c.props)); renderProps(); }
function collapseAll() { expandedProps.clear(); renderProps(); }
function clearAll() { selectedProps.clear(); activeThreat = null; selectedTactic = null; document.getElementById("search-input").value = ""; refresh(); }

// ===================================================================
// RENDER THREATS
// ===================================================================
function renderThreats() {
  const threatMap = computeThreats();
  const searchVal = document.getElementById("search-input").value.toLowerCase().trim();
  document.getElementById("search-clear").style.display = searchVal ? "block" : "none";

  let tids = Array.from(threatMap.keys()).sort((a,b) => parseInt(a.split("-")[1]) - parseInt(b.split("-")[1]));
  if (searchVal) tids = tids.filter(tid => tid.toLowerCase().includes(searchVal) || THREATS[tid].name.toLowerCase().includes(searchVal));

  const el = document.getElementById("threats-list");
  if (threatMap.size === 0) {
    el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><h4>No threats yet</h4><p>Select device properties to reveal applicable threats and their ESTM tactic mappings.</p></div>`;
    return;
  }
  if (tids.length === 0) { el.innerHTML = `<div class="empty-state"><p>No threats match "${searchVal}"</p></div>`; return; }

  // Group by category
  const groups = {"Hardware":[],"System Software":[],"Application Software":[],"Networking":[]};
  for (const tid of tids) groups[threatCatInfo(tid).name].push(tid);

  let html = "";
  for (const [catName, catTids] of Object.entries(groups)) {
    if (!catTids.length) continue;
    const col = threatCatInfo(catTids[0]).color;
    html += `<div style="border-bottom:1px solid var(--border)">`;
    html += `<div class="threat-cat-header"><div class="dot" style="background:${col}"></div><span class="name" style="color:${col}">${catName}</span><div class="line"></div><span class="num">${catTids.length}</span></div>`;
    for (const tid of catTids) {
      const tt = THREATS[tid];
      const sources = Array.from(threatMap.get(tid)).sort();
      const isAct = activeThreat === tid;
      html += `<div class="threat-row ${isAct ? "expanded" : ""}">`;
      html += `<button class="threat-btn" onclick="toggleThreat('${tid}')"><span class="threat-tid" style="color:${col}">${tid}</span><span class="threat-name">${tt.name}</span><svg class="threat-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>`;
      if (isAct) {
        html += `<div class="threat-detail">`;
        html += `<div class="detail-label">Triggered by</div><div class="detail-tags">${sources.map(p => `<span class="detail-tag pid-tag">${p}</span>`).join("")}</div>`;
        html += `<div class="detail-label">ESTM Tactics</div><div class="detail-tags">${tt.tactics.map(tac => {
          const tc = ESTM_TACTICS[tac];
          return `<span class="tactic-tag" style="border:1px solid ${tc.color}44;color:${tc.color};background:${tc.color}11">${tac}</span>`;
        }).join("")}</div>`;
        html += `<a class="detail-link" href="https://emb3d.mitre.org/threats/${tid}.html" target="_blank">View on MITRE <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`;
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

function toggleThreat(tid) { activeThreat = activeThreat === tid ? null : tid; renderThreats(); }

// ===================================================================
// RENDER TACTICS
// ===================================================================
function renderTactics() {
  const threatMap = computeThreats();
  const heat = computeTacticHeat(threatMap);
  const maxH = Math.max(1, ...Object.values(heat).map(v => v.count));
  const el = document.getElementById("tactics-list");

  if (threatMap.size === 0) {
    el.innerHTML = `<div class="empty-state" style="min-height:300px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><h4>No tactics active</h4><p>Select device properties to see which ESTM attack tactics apply to your device.</p></div>`;
    return;
  }

  let html = '<div class="tactics-list">';
  for (const [name, tac] of Object.entries(ESTM_TACTICS)) {
    const h = heat[name];
    const pct = h.count / maxH * 100;
    const isActive = h.count > 0;
    const isSel = selectedTactic === name;
    html += `<div>`;
    html += `<button class="tactic-card ${!isActive ? "disabled" : ""} ${isSel ? "active" : ""}" ${isActive ? `onclick="toggleTacticDetail('${name}')"` : ""}>`;
    html += `<div class="tactic-top"><span class="tactic-id">${tac.id}</span><span class="tactic-name" style="color:${isActive ? "#e7e5e4" : "#57534e"}">${name}</span>`;
    if (isActive) html += `<span class="tactic-count" style="color:${tac.color}">${h.count}</span>`;
    html += `</div>`;
    html += `<div class="tactic-bar"><div class="tactic-bar-fill" style="width:${pct}%;background:${isActive ? tac.color : "transparent"}"></div></div>`;
    html += `<div class="tactic-desc">${tac.desc}</div>`;
    html += `</button>`;
    if (isSel && h.count > 0) {
      const sorted = Array.from(h.threats).sort((a,b) => parseInt(a.split("-")[1]) - parseInt(b.split("-")[1]));
      html += `<div class="tactic-detail"><div class="detail-label">Contributing Threats (${h.count})</div>`;
      for (const tid of sorted) {
        const col = threatCatInfo(tid).color;
        html += `<div class="tactic-threat-row"><span class="tid" style="color:${col}">${tid}</span><span style="color:#d6d3d1">${THREATS[tid].name}</span></div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function toggleTacticDetail(name) { selectedTactic = selectedTactic === name ? null : name; renderTactics(); }

function switchTab(tab) {
  activeView = tab;
  document.getElementById("tab-threats").className = `tab ${tab === "threats" ? "active" : ""}`;
  document.getElementById("tab-tactics").className = `tab ${tab === "tactics" ? "active" : ""}`;
  document.getElementById("view-threats").style.display = tab === "threats" ? "block" : "none";
  document.getElementById("view-tactics").style.display = tab === "tactics" ? "block" : "none";
}

// ===================================================================
// STATS
// ===================================================================
function updateStats() {
  const threatMap = computeThreats();
  const heat = computeTacticHeat(threatMap);
  const total = threatMap.size;
  const tacCount = Object.values(heat).filter(v => v.count > 0).length;

  const sevColor = total === 0 ? "#57534e" : total < 10 ? "#6b9a8b" : total < 25 ? "#c6a664" : total < 50 ? "#d97757" : "#b84d3c";
  const sevLabel = total === 0 ? "—" : total < 10 ? "LOW" : total < 25 ? "MOD" : total < 50 ? "HIGH" : "CRIT";

  document.getElementById("stat-props").textContent = selectedProps.size;
  const te = document.getElementById("stat-threats"); te.textContent = total; te.style.color = sevColor;
  const tae = document.getElementById("stat-tactics"); tae.textContent = tacCount; tae.style.color = tacCount > 10 ? "#b84d3c" : tacCount > 5 ? "#c6a664" : "#6b9a8b";
  const se = document.getElementById("stat-severity"); se.textContent = sevLabel; se.style.color = sevColor;

  document.getElementById("tab-threats-count").textContent = total > 0 ? total : "";
  document.getElementById("tab-tactics-count").textContent = tacCount > 0 ? tacCount : "";
}

// ===================================================================
// CSV EXPORT
// ===================================================================
function downloadCSV() {
  const threatMap = computeThreats();
  if (threatMap.size === 0) return;
  const tids = Array.from(threatMap.keys()).sort((a,b) => parseInt(a.split("-")[1]) - parseInt(b.split("-")[1]));
  const rows = [["Threat ID","Threat Name","Category","ESTM Tactics","Triggered by Properties"]];
  for (const tid of tids) {
    const sources = Array.from(threatMap.get(tid)).sort().join("; ");
    const tactics = THREATS[tid].tactics.join("; ");
    rows.push([tid, THREATS[tid].name, threatCatInfo(tid).name, tactics, sources]);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = `emb3d-estm-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ===================================================================
// REFRESH
// ===================================================================
function refresh() { renderProps(); renderThreats(); renderTactics(); updateStats(); }

// ===================================================================
// INIT
// ===================================================================
document.getElementById("footer-counts").textContent = `${Object.keys(THREATS).length} threats · ${Object.keys(flatProps).length} properties · ${Object.keys(ESTM_TACTICS).length} ESTM tactics`;
refresh();
</script>
